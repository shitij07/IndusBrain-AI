services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-indusbrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-indusbrain}
      POSTGRES_DB: ${POSTGRES_DB:-indusbrain}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-indusbrain}:${POSTGRES_PASSWORD:-indusbrain}@db:5432/${POSTGRES_DB:-indusbrain}
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      API_PROXY_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
