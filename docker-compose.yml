services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-indusbrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-indusbrain}
      POSTGRES_DB: ${POSTGRES_DB:-indusbrain}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  chromadb:
    image: chromadb/chroma:0.6.3
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma_data
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chroma_data:/chroma/chroma_data
    ports:
      - "8001:8000"

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-indusbrain}:${POSTGRES_PASSWORD:-indusbrain}@db:5432/${POSTGRES_DB:-indusbrain}
      CHROMA_PERSIST_DIR: /chroma_data
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-indusbrain}
    volumes:
      - chroma_data:/chroma_data
      - upload_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      - db
      - chromadb
      - neo4j

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-indusbrain}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"
      - "7687:7687"

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      API_PROXY_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
  chroma_data:
  upload_data:
  neo4j_data:
